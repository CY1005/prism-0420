repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (api/tests)
        entry: uv run ruff check
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format --check (api/tests)
        entry: uv run ruff format --check
        language: system
        types: [python]
        require_serial: true

      - id: prettier-app
        name: prettier --check (app/)
        entry: bash -c 'cd app && pnpm exec prettier --check .'
        language: system
        files: ^app/
        pass_filenames: false
        require_serial: true

      - id: eslint-app
        name: eslint (app/)
        entry: bash -c 'cd app && pnpm exec eslint'
        language: system
        files: ^app/.*\.(ts|tsx|js|jsx|mjs|cjs)$
        pass_filenames: false
        require_serial: true

      - id: ci-lint
        name: ci-lint (R13-1 ErrorCode↔AppError parity)
        entry: bash scripts/ci-lint.sh
        language: system
        files: ^api/errors/(codes|exceptions)\.py$
        pass_filenames: false
        require_serial: true
