name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"  # 每周一 04:00 UTC / deps-audit 兜底
  workflow_dispatch:

# 决策来源：design/01-engineering/03-cicd-plan.md §8（Phase 2.3 子 sprint A 补完）
# 单 workflow + 多 job 并行 / Python 3.12 单 / Node 22 单 / GH secrets → env: 注入

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ----- Backend lint + typecheck -----
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check api/
      - name: Ruff format check
        run: uv run ruff format --check api/

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Mypy（可选 / 当前不阻塞 / 03-cicd §2 mypy "Phase 2.0 末期加"）
        run: uv run mypy api/ || true

  # ----- Backend tests -----
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
          POSTGRES_DB: prism_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://prism:prism@localhost:5432/prism_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-1234567890
      INTERNAL_TOKEN: ci-test-internal-token-min-32-chars-12345
      ENCRYPTION_KEY: ZGV2LW9ubHktYWVzLTMyYnl0ZS1lbmNyeXB0aW9uLWs=
      APP_ENV: ci
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Alembic upgrade
        run: uv run alembic upgrade head
      - name: Pytest
        run: uv run pytest -x --cov=api --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: .coverage
          retention-days: 7

  # ----- Frontend lint + test -----
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # ----- Build -----
  build:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Frontend build
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ----- Migrate dry-run（PR 才跑 / 防破坏性 alembic）-----
  migrate-dryrun:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
          POSTGRES_DB: prism_dry
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://prism:prism@localhost:5432/prism_dry
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Alembic dry-run（SQL preview）
        run: uv run alembic upgrade head --sql > /tmp/migration.sql
      - name: Show migration SQL
        run: head -200 /tmp/migration.sql

  # ----- OpenAPI codegen drift guard（SR-P22-2 sink #4 / spec 03 §8.5）-----
  codegen-drift:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: uv sync --frozen
      - name: Export OpenAPI
        run: uv run python scripts/export_openapi.py
      - name: Frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: Codegen
        working-directory: app
        run: pnpm codegen
      - name: Diff check（schema 漂移 → 失败）
        run: git diff --exit-code app/src/types/api.ts app/openapi.json

  # ----- 周扫 / 依赖漏洞 -----
  deps-audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: pip-audit
        run: uv run pip-audit || true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm audit
        working-directory: app
        run: pnpm audit --audit-level=high || true
